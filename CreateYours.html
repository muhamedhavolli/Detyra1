<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <fieldset>
        <legend>Complete your CV</legend>
    <form>
        <p style="display: inline-block;">Emri:</p>
        <input type="text" placeholder="Name" >
        <br>
        <p style="display: inline-block;">Mbiemri:</p>
        <input type="text" placeholder="Surname"  >
        <br>
        <p style="display: inline-block;">Email:</p>
        <input type="email" placeholder="youremail@gmail.com" > 
        <br>
        <p style="display: inline-block;">Numri kontaktues:</p>
        <input type="tel" placeholder="Phone Number">
        <p>Gjinia: </p>
        <p style="display: inline;">M</p>
        <input type="radio" name="gjinia" style="margin-top: -100px;" > 
        <p style="display: inline;">F</p>
        <input type="radio" name="gjinia" style="margin-top: -100px;" >
        <br>
        <p style="display: inline-block;">Mosha:</p>
        <input type="number">
        <br>
        <p style="display: inline-block;">Data e lindjes:</p>
        <input type="date">
        <br>
        <label for="qytetet">Vendbanimi:</label>
        <select id="qytetet">
            <option>Zgjedh Qytetin:</option>
            <option>Prishtine</option>
            <option>Prizren</option>
            <option>Peje</option>
            <option>Gjakove</option>
            <option>Gjilan</option>
            <option>Mitrovice</option>
            <option>Ferizaj</option>

        </select>
        <br>

        <p style="display: inline-block;">Rruga:</p>
        <input type="text">
        <br>
        <p style="display: inline-block;">Ngarko nje foto tenden:</p>
        <input type="file" placeholder="Upload Photo">

    </fieldset>
    <br><br>

    <fieldset>
        <legend>Shkathtesite dhe Karakteristikat</legend>
        <p style="display: inline-block;">Edukimi:</p>
        <br>
        
        <input type="checkbox"  >
        <p style="display: inline-block;">Shkolla Fillore</p>
        <br>
        <input type="checkbox"  >
        <p style="display: inline-block;">Shkolla e mesme</p>
        <br>
        <input type="checkbox"  >
        <p style="display: inline-block;">Bachellor</p>
        <br>
        <input type="checkbox"  >
        <p style="display: inline-block;">Master</p>
        <hr>
        
        <br>
        <p style="display: inline-block;">Gjuhet:</p>
        <br>
        <p style="display: inline-block;">Shqipe </p>
        <input type="range" min="0" max="10" value="0">
        <br>
        <p style="display: inline-block;">Angle </p>
        <input type="range" min="0" max="10" value="0">
        <br>
        <p style="display: inline-block;">Gjermane </p>
        <input type="range" min="0" max="10" value="0">
        <br>
        <p style="display: inline-block;">Frenge </p>
        <input type="range" min="0" max="10" value="0">
        <br>
        <hr>
        <form>
            <label for="message"><label>
            <textarea name="message" id="message" rows="10" cols="30" placeholder="Shkruaj nje ese per veten dhe permend karakteristikat tua..."></textarea>
            <br>
            <input type="reset"> <input type="submit" name="" id="">
        </form>

    </fieldset>
    </form>   
    </fieldset>      
    
</body>
</html>
